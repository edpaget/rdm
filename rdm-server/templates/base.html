<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}rdm{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Neue, Arial, sans-serif;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    a { color: #0055aa; }
    a:focus, a:hover { text-decoration: underline; }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      padding: 0.5rem 1rem;
      background: #0055aa;
      color: #fff;
      z-index: 100;
      text-decoration: none;
    }
    .skip-link:focus {
      left: 0;
    }
    .container {
      max-width: 60rem;
      margin: 0 auto;
      padding: 0 1rem;
    }
    header {
      border-bottom: 2px solid #1a1a1a;
      padding: 1rem 0;
      margin-bottom: 1rem;
    }
    header .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      text-decoration: none;
      color: #1a1a1a;
    }
    nav[aria-label="Breadcrumb"] ol {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    nav[aria-label="Breadcrumb"] li {
      display: flex;
      align-items: center;
    }
    nav[aria-label="Breadcrumb"] li + li::before {
      content: "/";
      margin: 0 0.5rem;
      color: #666;
    }
    main { margin-bottom: 2rem; }
    footer {
      border-top: 1px solid #ccc;
      padding: 1rem 0;
      color: #666;
      font-size: 0.875rem;
    }
    h1 { font-size: 1.75rem; margin: 0.5rem 0 1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #ddd;
    }
    th { font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.8125rem;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-not-started { background: #f0f0f0; color: #555; border-color: #ccc; }
    .badge-in-progress { background: #e8f4fd; color: #0a558c; border-color: #b6d9f0; }
    .badge-done { background: #e6f9e6; color: #1a7a1a; border-color: #a3d9a3; }
    .badge-blocked { background: #fde8e8; color: #8b1a1a; border-color: #f0a3a3; }
    .badge-open { background: #fff8e1; color: #6d5700; border-color: #e6c200; }
    .badge-wont-fix { background: #f0f0f0; color: #555; border-color: #ccc; }
    .badge-low { background: #f0f0f0; color: #555; border-color: #ccc; }
    .badge-medium { background: #fff8e1; color: #6d5700; border-color: #e6c200; }
    .badge-high { background: #fde8e8; color: #8b1a1a; border-color: #f0a3a3; }
    .badge-critical { background: #8b1a1a; color: #fff; border-color: #8b1a1a; }
    .body-content { margin: 1.5rem 0; }
    .body-content pre {
      background: #f5f5f5;
      padding: 1rem;
      overflow-x: auto;
      border-radius: 0.25rem;
    }
    .body-content code {
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: 0.875em;
    }
    .meta { margin: 1rem 0; }
    .meta dt { font-weight: 600; display: inline; }
    .meta dt::after { content: ": "; }
    .meta dd { display: inline; margin: 0; }
    .meta dd + dt { display: block; margin-top: 0.25rem; }
    .sibling-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
    }
    :focus-visible {
      outline: 2px solid #0055aa;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="container">
    <header>
      <a href="/" class="site-title">rdm</a>
    </header>
    <nav aria-label="Breadcrumb">
      <ol>
        {% block breadcrumb %}{% endblock %}
      </ol>
    </nav>
    <main id="main-content">
      {% block content %}{% endblock %}
    </main>
    <footer>
      Powered by <a href="https://github.com/edward/rdm">rdm</a>
    </footer>
  </div>
</body>
</html>
