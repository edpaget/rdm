<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}rdm{% endblock %}</title>
  <script>
    // Apply theme before render to prevent flash of wrong theme
    (function() {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <style>
    :root {
      --color-text: #1a1a1a;
      --color-bg: #fff;
      --color-link: #0055aa;
      --color-link-hover: #004499;
      --color-border: #1a1a1a;
      --color-border-light: #ddd;
      --color-muted: #666;
      --color-input-border: #ccc;
      --color-code-bg: #f5f5f5;
      --color-focus-ring: #0055aa;

      --badge-not-started-bg: #f0f0f0;
      --badge-not-started-text: #555;
      --badge-not-started-border: #ccc;

      --badge-in-progress-bg: #e8f4fd;
      --badge-in-progress-text: #0a558c;
      --badge-in-progress-border: #b6d9f0;

      --badge-done-bg: #e6f9e6;
      --badge-done-text: #1a7a1a;
      --badge-done-border: #a3d9a3;

      --badge-blocked-bg: #fde8e8;
      --badge-blocked-text: #8b1a1a;
      --badge-blocked-border: #f0a3a3;

      --badge-open-bg: #fff8e1;
      --badge-open-text: #6d5700;
      --badge-open-border: #e6c200;

      --badge-wont-fix-bg: #f0f0f0;
      --badge-wont-fix-text: #555;
      --badge-wont-fix-border: #ccc;

      --badge-low-bg: #f0f0f0;
      --badge-low-text: #555;
      --badge-low-border: #ccc;

      --badge-medium-bg: #fff8e1;
      --badge-medium-text: #6d5700;
      --badge-medium-border: #e6c200;

      --badge-high-bg: #fde8e8;
      --badge-high-text: #8b1a1a;
      --badge-high-border: #f0a3a3;

      --badge-critical-bg: #8b1a1a;
      --badge-critical-text: #fff;
      --badge-critical-border: #8b1a1a;
    }

    [data-theme="dark"] {
      --color-text: #e0e0e0;
      --color-bg: #1a1a2e;
      --color-link: #6db3f2;
      --color-link-hover: #8fc8f8;
      --color-border: #e0e0e0;
      --color-border-light: #3a3a5a;
      --color-muted: #999;
      --color-input-border: #4a4a6a;
      --color-code-bg: #2a2a4a;
      --color-focus-ring: #6db3f2;

      --badge-not-started-bg: #2a2a4a;
      --badge-not-started-text: #aaa;
      --badge-not-started-border: #4a4a6a;

      --badge-in-progress-bg: #1a2a4a;
      --badge-in-progress-text: #6db3f2;
      --badge-in-progress-border: #2a4a7a;

      --badge-done-bg: #1a3a1a;
      --badge-done-text: #6dd96d;
      --badge-done-border: #2a6a2a;

      --badge-blocked-bg: #3a1a1a;
      --badge-blocked-text: #f08080;
      --badge-blocked-border: #6a2a2a;

      --badge-open-bg: #3a3000;
      --badge-open-text: #f0d060;
      --badge-open-border: #6a5a00;

      --badge-wont-fix-bg: #2a2a4a;
      --badge-wont-fix-text: #aaa;
      --badge-wont-fix-border: #4a4a6a;

      --badge-low-bg: #2a2a4a;
      --badge-low-text: #aaa;
      --badge-low-border: #4a4a6a;

      --badge-medium-bg: #3a3000;
      --badge-medium-text: #f0d060;
      --badge-medium-border: #6a5a00;

      --badge-high-bg: #3a1a1a;
      --badge-high-text: #f08080;
      --badge-high-border: #6a2a2a;

      --badge-critical-bg: #cc2a2a;
      --badge-critical-text: #fff;
      --badge-critical-border: #cc2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Neue, Arial, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    a { color: var(--color-link); }
    a:focus, a:hover { text-decoration: underline; }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      padding: 0.5rem 1rem;
      background: var(--color-link);
      color: var(--color-bg);
      z-index: 100;
      text-decoration: none;
    }
    .skip-link:focus {
      left: 0;
    }
    .container {
      max-width: 60rem;
      margin: 0 auto;
      padding: 0 1rem;
    }
    header {
      border-bottom: 2px solid var(--color-border);
      padding: 1rem 0;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--color-text);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-search {
      display: flex;
      gap: 0.25rem;
    }
    .header-search input[type="search"] {
      padding: 0.25rem 0.5rem;
      border: 1px solid var(--color-input-border);
      border-radius: 0.25rem;
      font-size: 0.875rem;
      background: var(--color-bg);
      color: var(--color-text);
    }
    .header-search button {
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--color-link);
      background: var(--color-link);
      color: var(--color-bg);
      border-radius: 0.25rem;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .header-search button:hover {
      background: var(--color-link-hover);
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--color-input-border);
      border-radius: 0.25rem;
      padding: 0.25rem 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      color: var(--color-text);
      line-height: 1;
    }
    .theme-toggle:hover {
      border-color: var(--color-link);
    }
    nav[aria-label="Breadcrumb"] ol {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    nav[aria-label="Breadcrumb"] li {
      display: flex;
      align-items: center;
    }
    nav[aria-label="Breadcrumb"] li + li::before {
      content: "/";
      margin: 0 0.5rem;
      color: var(--color-muted);
    }
    main { margin-bottom: 2rem; }
    footer {
      border-top: 1px solid var(--color-input-border);
      padding: 1rem 0;
      color: var(--color-muted);
      font-size: 0.875rem;
    }
    h1 { font-size: 1.75rem; margin: 0.5rem 0 1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--color-border-light);
    }
    th { font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.8125rem;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-not-started { background: var(--badge-not-started-bg); color: var(--badge-not-started-text); border-color: var(--badge-not-started-border); }
    .badge-in-progress { background: var(--badge-in-progress-bg); color: var(--badge-in-progress-text); border-color: var(--badge-in-progress-border); }
    .badge-done { background: var(--badge-done-bg); color: var(--badge-done-text); border-color: var(--badge-done-border); }
    .badge-blocked { background: var(--badge-blocked-bg); color: var(--badge-blocked-text); border-color: var(--badge-blocked-border); }
    .badge-open { background: var(--badge-open-bg); color: var(--badge-open-text); border-color: var(--badge-open-border); }
    .badge-wont-fix { background: var(--badge-wont-fix-bg); color: var(--badge-wont-fix-text); border-color: var(--badge-wont-fix-border); }
    .badge-low { background: var(--badge-low-bg); color: var(--badge-low-text); border-color: var(--badge-low-border); }
    .badge-medium { background: var(--badge-medium-bg); color: var(--badge-medium-text); border-color: var(--badge-medium-border); }
    .badge-high { background: var(--badge-high-bg); color: var(--badge-high-text); border-color: var(--badge-high-border); }
    .badge-critical { background: var(--badge-critical-bg); color: var(--badge-critical-text); border-color: var(--badge-critical-border); }
    .body-content { margin: 1.5rem 0; }
    .body-content pre {
      background: var(--color-code-bg);
      padding: 1rem;
      overflow-x: auto;
      border-radius: 0.25rem;
    }
    .body-content code {
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: 0.875em;
    }
    .meta { margin: 1rem 0; }
    .meta dt { font-weight: 600; display: inline; }
    .meta dt::after { content: ": "; }
    .meta dd { display: inline; margin: 0; }
    .meta dd + dt { display: block; margin-top: 0.25rem; }
    .sibling-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border-light);
    }
    :focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="container">
    <header>
      <a href="/" class="site-title">rdm</a>
      <div class="header-actions">
        {% block header_search %}{% endblock %}
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
      </div>
    </header>
    <nav aria-label="Breadcrumb">
      <ol>
        {% block breadcrumb %}{% endblock %}
      </ol>
    </nav>
    <main id="main-content">
      {% block content %}{% endblock %}
    </main>
    <footer>
      Powered by <a href="https://github.com/edpaget/rdm">rdm</a>
    </footer>
  </div>
  <script>
    (function() {
      var btn = document.getElementById("theme-toggle");
      function updateIcon() {
        var isDark = document.documentElement.getAttribute("data-theme") === "dark";
        btn.textContent = isDark ? "\u2600\uFE0F" : "\uD83C\uDF19";
      }
      updateIcon();
      btn.addEventListener("click", function() {
        var current = document.documentElement.getAttribute("data-theme");
        var next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateIcon();
      });
    })();
  </script>
</body>
</html>
